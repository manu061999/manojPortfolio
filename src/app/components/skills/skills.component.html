<section id="skills" class="skills" data-aos="fade-up">
  <div class="container">
    <div class="section-heading">
      <span class="bg-text">Expertise</span>
      <h2 class="fg-text">My Skills</h2>
    </div>

    <div class="row g-4 mt-3">
      <div class="col-lg-4 col-md-6" *ngFor="let cat of categories; let i = index"
           data-aos="fade-up" [attr.data-aos-delay]="100 + i * 50">
        <div class="skill-card" [style.--card-color]="cat.color">
          <div class="icon-wrap">
            <i class="bi" [ngClass]="cat.icon"></i>
          </div>
          <h3>{{ cat.title }}</h3>
          <div class="skill-tags">
            <span class="badge" *ngFor="let skill of cat.skills">{{ skill }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
